<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="mb-1">Questions</h2>
        <p class="text-muted mb-0">Manage your assessment question bank</p>
    </div>
    <button class="btn btn-primary-custom" (click)="createQuestion()">
        <i class="bi bi-plus-lg me-1"></i> New Question
    </button>
</div>

<!-- Filters (Placeholder) -->
<div class="card-common mb-4 p-3 bg-white">
    <div class="row g-3">
        <div class="col-md-3">
            <input type="text" class="form-control" placeholder="Search questions..." />
        </div>
        <div class="col-md-2">
            <select class="form-select">
                <option value="">Status: All</option>
                <option value="published">Published</option>
                <option value="draft">Draft</option>
            </select>
        </div>
    </div>
</div>

<!-- Table -->
<app-data-table [columns]="columns" [data]="questions() || []" (onEdit)="editQuestion($event)"
    (onDelete)="deleteQuestion($event)"></app-data-table>
