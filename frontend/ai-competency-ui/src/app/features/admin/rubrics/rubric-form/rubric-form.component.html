<div class="mb-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-1">
            <li class="breadcrumb-item"><a routerLink="/admin/rubrics">Rubrics</a></li>
            <li class="breadcrumb-item active">New Rubric</li>
        </ol>
    </nav>
    <h2>Create Rubric</h2>
</div>

<form [formGroup]="form" (ngSubmit)="onSubmit()" class="row g-4">
    <!-- Basic Info -->
    <div class="col-lg-12">
        <div class="card-common bg-white mb-4">
            <h5 class="mb-3">Rubric Details</h5>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Name</label>
                    <input class="form-control" formControlName="name" placeholder="Rubric Name">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Competency Group</label>
                    <select class="form-select" formControlName="competencyGroupId">
                        <option value="cg1">AI Fundamentals</option>
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Level</label>
                    <select class="form-select" formControlName="competencyLevelId">
                        <option value="cl1">Level 1</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Criteria -->
    <div class="col-lg-12">
        <div class="card-common bg-white">
            <div class="d-flex justify-content-between mb-3">
                <h5 class="mb-0">Criteria</h5>
                <button type="button" class="btn btn-sm btn-outline-primary" (click)="addCriteria()">
                    + Add Criteria
                </button>
            </div>

            <div formArrayName="criteria">
                <div *ngFor="let c of criteria.controls; let i=index" [formGroupName]="i"
                    class="border p-3 rounded mb-3 bg-light">
                    <div class="row align-items-end">
                        <div class="col-md-7">
                            <label class="form-label small">Description</label>
                            <input class="form-control" formControlName="description"
                                placeholder="Criteria description">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small">Max Score</label>
                            <input type="number" class="form-control" formControlName="maxScore">
                        </div>
                        <div class="col-md-2">
                            <button type="button" class="btn btn-sm btn-danger w-100" (click)="removeCriteria(i)">
                                <i class="bi bi-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="col-12 text-end">
        <button class="btn btn-primary-custom px-4" type="submit" [disabled]="form.invalid">
            Save Rubric
        </button>
    </div>
</form>
