services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm_server
    command: >
      --model Qwen/Qwen2.5-14B-Instruct-AWQ
      --quantization awq
      --dtype half
      --max-model-len 8192
      --gpu-memory-utilization 0.95
      --enforce-eager
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8000:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN} 
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    shm_size: "4g"