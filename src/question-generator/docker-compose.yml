
services:
  vllm:
    image: vllm/vllm-openai:latest
    command: >
      --model openai/gpt-oss-20b
      --quantization mxfp4
      --dtype bfloat16
      --max-model-len 8192
      --gpu-memory-utilization 0.90
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8000:8000"
    environment:
      - VLLM_WORKER_USE_FLASH_ATTENTION=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    shm_size: "2g"
