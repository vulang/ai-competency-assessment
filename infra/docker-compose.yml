version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ai_competency
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  question-generator:
    build:
      context: ../src/question-generator
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../src/question-generator/.env

volumes:
  postgres_data:
  mongo_data:
  minio_data:
  qdrant_data:
